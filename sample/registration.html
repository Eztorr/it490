<!DOCTYPE html>
<HTML>
        <head>
                <title>Register</title>
                <link rel="stylesheet" href="register.css" />
        </head>
        <body>
                <h1>Sign Up!</h1>
		<div class="signUp">
			<form id="validateForm" action="/app/registerRequest.php" method="POST">
				<label>Email</label><br>
                        	<input  id = "email" name="email" placeholder="example@email.com"><br>
                        	<label>Password</label><br>
				<input type = "password" id ="password" name="password" placeholder="Password1!"><br>
				<p id="message">Password Requirements:
					<br>- At least 8 characters long
					<br>- At least one capital letter
					<br>- At least one special character
					<br>- At least one digit
				</p>
				<p id="errorMsg"></p>
				<button id="submitButton" type = "submit">SUBMIT</button>

                	</form>
		</div>
		<script src="/app/validation.js"></script>
        </body>

</HTML>
